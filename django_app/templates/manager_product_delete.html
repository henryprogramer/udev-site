{% extends 'base.html' %}

{% block title %}Remover Produto | UDEV | StartUP{% endblock %}

{% block content %}
<section class="hero" data-animate="fade-up">
  <h1>Remover Produto</h1>
  <p class="lead">Confirme a exclusão para continuar.</p>
</section>

<section class="section" data-animate="fade-up">
  <article class="card auth-card">
    <p>Deseja remover <strong>{{ product.name }}</strong>?</p>
    <form method="post" class="actions-row">
      {% csrf_token %}
      <button class="btn btn-primary" type="submit">Sim, remover</button>
      <a class="btn btn-secondary" href="{% url 'manager_dashboard' %}">Cancelar</a>
    </form>
  </article>
</section>
{% endblock %}
